# /etc/nginx/sites-available/todohunter 로 복사
# 활성화: sudo ln -s /etc/nginx/sites-available/todohunter /etc/nginx/sites-enabled/
# 리로드: sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS 적용은 certbot이 이 파일을 자동으로 수정함:
#   sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
#
# ⚠️ YOUR_DOMAIN 부분을 실제 도메인으로 치환하세요 (예: todohunter.com)

# HTTP → HTTPS 리다이렉트 (certbot이 자동 추가해주지만 명시)
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt 인증용 경로 (certbot이 씀)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 전부 HTTPS로
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (certbot 실행 후 자동으로 완성됨)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # certbot이 여기 ssl_certificate 경로 자동 추가함
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # SSL 보안 강화
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 필요 시 CSP 추가 (카카오/Sentry 도메인 허용 등)

    # 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # 요청 크기 제한
    client_max_body_size 10M;

    # Next.js 정적 파일 장기 캐싱
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3050;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # public 폴더 이미지/아이콘도 캐싱 (옵션)
    location ~* \.(jpg|jpeg|png|gif|svg|ico|webp|woff2)$ {
        proxy_pass http://127.0.0.1:3050;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=604800";  # 7일
    }

    # 메인 프록시 (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3050;
        proxy_http_version 1.1;

        # WebSocket / HMR 대비 (프로덕션엔 필요 없지만 안전장치)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 프록시 헤더 — Next.js가 실제 IP/도메인 인식
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # 타임아웃
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_cache_bypass $http_upgrade;
    }

    # 접근 로그
    access_log /var/log/nginx/todohunter.access.log;
    error_log  /var/log/nginx/todohunter.error.log;
}
